<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Draaien - Spin to Tee</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/wheel.css">

</head>

<body>

<div class="container">

    <h1 id="currentPlayer"></h1>

    <div id="wheelWrapper">

        <div id="pointer"></div>

        <svg
            id="wheel"
            viewBox="0 0 400 400">

            <g id="segments"></g>

            <circle
                cx="200"
                cy="200"
                r="25"
                fill="white"/>

        </svg>

    </div>

    <button id="spinButton">
        Draai het rad
    </button>

</div>

<div id="overlay">

    <div id="overlayCard">

        <h2 id="winnerPlayer"></h2>

        <h1 id="winnerTee"></h1>

        <button id="nextButton">
            Volgende speler
        </button>

    </div>

</div>

<script src="js/draaien.js"></script>

</body>

</html>
