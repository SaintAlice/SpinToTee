<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Draaien - Spin to Tee</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#1f5f2e;
    color:white;
    font-family:Arial,sans-serif;

}

.container{

    width:90%;
    max-width:600px;

    margin:60px auto;

    text-align:center;

}

h1{

    margin-bottom:40px;

}

#currentPlayer{

    font-size:36px;
    font-weight:bold;

}

#wheelWrapper{

    margin:40px auto;

    position:relative;

    width:320px;
    height:320px;

}

#pointer{

    font-size:40px;

    position:absolute;

    top:-35px;

    left:50%;

    transform:translateX(-50%);

    z-index:10;

}

#wheel{

    width:320px;
    height:320px;

    transition:transform 5s cubic-bezier(.17,.67,.25,1);

}

#spinButton{

    margin-top:40px;

    width:100%;

}

#overlay{

    position:fixed;
    inset:0;

    background:rgba(0,0,0,.8);

    display:none;

    justify-content:center;
    align-items:center;

}

#overlayCard{

    background:white;
    color:black;

    padding:40px;

    border-radius:20px;

    min-width:300px;

    text-align:center;

}

#winnerTee{

    margin:20px 0;

}

</style>

</head>

<body>

<div class="container">

    <h1 id="currentPlayer"></h1>

    <div id="wheelWrapper">

        <div id="pointer">
            ▼
        </div>

        <svg
    id="wheel"
    width="320"
    height="320"
    viewBox="0 0 400 400">

    <g id="segments">

    </g>

    <circle
        cx="200"
        cy="200"
        r="25"
        fill="white"/>

    </svg>

        </div>

    </div>

    <button id="spinButton">
        Draai het rad
    </button>

    <div id="overlay">

        <div id="overlayCard">

            <h2 id="winnerPlayer"></h2>

            <h1 id="winnerTee"></h1>

            <button id="nextButton">
                Volgende speler
            </button>

        </div>

    </div>
</div>

<script src="js/draaien.js"></script>

</body>

</html>
