<style>

    margin:0;
    padding:0;
    box-sizing:border-box;
}

    background:#1f5f2e;
    color:white;
    font-family:Arial,sans-serif;

}

.container{

    width:90%;
    max-width:600px;

    margin:60px auto;

}

h1{

    text-align:center;

    margin-bottom:40px;

}

    background:rgba(255,255,255,.15);

    padding:15px;

    border-radius:10px;

    margin-bottom:10px;

    font-size:22px;

button{

    width:100%;

    margin-top:40px;

    padding:15px;

    font-size:20px;

    border:none;

    border-radius:10px;

    cursor:pointer;

}
