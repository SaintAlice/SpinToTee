<!DOCTYPE html>
<html lang="nl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tee's kiezen - Spin to Tee</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/tees.css">

</head>

<body>

<div class="container">

    <h1>Kies de tee's</h1>

    <p class="subtitle">
        Selecteer minimaal 2 tee's
    </p>

    <div id="teeGrid">

        <!-- Wit -->
        <div class="teeCard">

            <input
                type="checkbox"
                id="wit"
                value="Wit">

            <label for="wit">

                <img
                    src="images/tee-wit.svg"
                    class="teeSvg"
                    alt="Wit">

                <span>Wit</span>

                <div class="teeLine wit"></div>

            </label>

        </div>

        <!-- Geel -->
        <div class="teeCard">

            <input
                type="checkbox"
                id="geel"
                value="Geel">

            <label for="geel">

            <img
                src="images/tee-geel.svg"
                class="teeSvg"
                alt="Geel">

            <span>Geel</span>

            <div class="teeLine geel"></div>

            </label>
        </div>

        <!-- Blauw -->
        <div class="teeCard">

            <input
                type="checkbox"
                id="blauw"
                value="Blauw">

            <label for="blauw">

            <img
                src="images/tee-blauw.svg"
                class="teeSvg"
                alt="Blauw">

            <span>Blauw</span>

            <div class="teeLine blauw"></div>

            </label>

        </div>

        <!-- Rood -->
        <div class="teeCard">

            <input
                type="checkbox"
                id="rood"
                value="Rood">

            <label for="rood">

            <img
                src="images/tee-rood.svg"
                class="teeSvg"
                alt="Rood">

            <span>Rood</span>

            <div class="teeLine rood"></div>

            </label>

        </div>

        <!-- Oranje -->
        <div class="teeCard">

            <input
                type="checkbox"
                id="oranje"
                value="Oranje">

            <label for="oranje">

            <img
                src="images/tee-oranje.svg"
                class="teeSvg"
                alt="Oranje">

            <span>Oranje</span>

            <div class="teeLine oranje"></div>

            </label>

        </div>

    </div>

    <button
        id="startButton"
        disabled>

        Start draaien

    </button>

</div>

<script src="js/tees.js"></script>

</body>

</html>
